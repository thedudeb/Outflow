name: Staging Browser Sync

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: outflow-staging-browser-sync
  cancel-in-progress: false

jobs:
  browser-sync:
    name: Browser-visible hosted sync acceptance
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: staging

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify browser-sync harness contract
        run: npm run test:staging-browser-sync
      - name: Run browser-visible hosted sync acceptance
        run: npm run check:staging-browser-sync
        env:
          SUPABASE_URL: ${{ vars.OUTFLOW_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.OUTFLOW_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.OUTFLOW_SUPABASE_SECRET_KEY }}
          OUTFLOW_APP_URL: ${{ vars.OUTFLOW_APP_URL }}
          OUTFLOW_ACCEPTANCE_PROJECT_REF: ${{ vars.OUTFLOW_SUPABASE_PROJECT_REF }}
          OUTFLOW_ACCEPTANCE_MODE: staging
