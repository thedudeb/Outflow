name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  functions:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.8.1
      - run: npm run test:function-types
      - run: npm run test:function-runtime

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 55439:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm run test:account-foundation
        env:
          OUTFLOW_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:55439/postgres

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:account-prompts
      - run: npm run test:feature-access
      - run: npm run test:service-readiness
      - run: npm run test:staging-boundaries
      - run: npm run test:staging-account-plane
      - run: npm run test:staging-browser-sync
      - run: npm run test:staging-billing-plane
      - run: npm run test:staging-messaging-plane
      - run: npm run test:reminder-operations
      - run: npm run test:reminder-incident
      - run: npm run test:account-service
      - run: npm run test:pwa-cache
      - run: npm run test:pwa
      - run: npm run test:e2e
